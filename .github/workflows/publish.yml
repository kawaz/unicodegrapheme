name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon update
        run: moon update
      - name: Moon check
        run: moon check --deny-warn
      - name: Moon test
        run: moon test --target all
      - name: Publish (dry-run)
        run: moon publish --dry-run
      - name: Publish
        run: |
          echo "$MOONCAKES_TOKEN" > ~/.moon/credentials.json
          moon publish
          rm ~/.moon/credentials.json
        env:
          MOONCAKES_TOKEN: ${{ secrets.MOONCAKES_TOKEN }}
